services:
  - type: web
    name: studygrind
    runtime: python
    repo: https://github.com/Mnqobi-007/studygrind
    plan: free
    region: oregon
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.14
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: true
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: studygrind_db
          property: connectionString

  - type: database
    name: studygrind_db
    plan: free
    region: oregon
    databaseName: studygrind
    postgresMajorVersion: 15
