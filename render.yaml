services:
  - type: web
    name: studygrind
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: studygrind-db
          property: connectionString
      - key: RENDER
        value: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: studygrind-db
    databaseName: studygrind
    user: studygrind
    plan: free
