services:
  - type: web
    name: studygrind
    runtime: python
    repo: https://github.com/yourusername/studygrind
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: studygrind_db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: database
    name: studygrind_db
    plan: free
    region: oregon
    databaseName: studygrind
    postgresMajorVersion: 15
